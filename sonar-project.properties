sonar.projectKey=Mahery23_skillhub-examen
sonar.organization=mahery23

# Sources : Laravel + React seulement (Spring Boot a son propre scan)
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests,frontend/src
sonar.test.inclusions=frontend/src/**/*.test.js,frontend/src/**/*.test.jsx

# Rapports de coverage
sonar.php.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Exclusions
sonar.exclusions=**/vendor/**,**/node_modules/**,**/dist/**,**/target/**,**/storage/**,**/bootstrap/cache/**,**/*.blade.php,**/public/**,**/coverage/**,auth-service/**

sonar.coverage.exclusions=backend/app/Console/**,backend/app/Exceptions/**,backend/app/Providers/**,backend/database/**,frontend/src/main.jsx,frontend/src/App.jsx,frontend/src/pages/**,frontend/vite.config.js

sonar.sourceEncoding=UTF-8
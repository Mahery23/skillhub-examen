name: CI/CD Pipeline — SkillHub + Auth Service

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Auth Service Spring Boot
  # ─────────────────────────────────────────
  auth-service:
    name: Auth Service — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build et tests avec couverture JaCoCo
        working-directory: auth-service
        env:
          APP_MASTER_KEY: test_master_key_for_ci_only_32chars
        run: mvn verify -B

      - name: Analyse SonarCloud — Auth Service
        working-directory: auth-service
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          APP_MASTER_KEY: ${{ secrets.APP_MASTER_KEY }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=Mahery23_skillhub-examen \
            -Dsonar.organization=mahery23 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -B


  # ─────────────────────────────────────────
  # JOB 2 — CI Backend Laravel + Frontend
  # ─────────────────────────────────────────
  ci:
    name: CI — Laravel · React · SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── PHP ──
      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_mysql, zip, bcmath, gd, mongodb-2.2.0

      - name: Install dépendances backend
        working-directory: ./backend
        run: |
          mkdir -p bootstrap/cache storage/logs \
                   storage/framework/cache \
                   storage/framework/sessions \
                   storage/framework/views
          composer install --optimize-autoloader --no-interaction --ignore-platform-req=ext-mongodb

      - name: Lint backend
        working-directory: ./backend
        run: ./vendor/bin/phpcs --standard=PSR12 app/ || true

      - name: Tests backend avec coverage
        working-directory: ./backend
        env:
          MONGODB_URI: "mongodb://localhost:27017/test"
          AUTH_SERVICE_URL: "http://localhost:8080"
        run: php artisan test --configuration=phpunit.xml

      # ── Node.js ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dépendances frontend
        working-directory: ./frontend
        run: npm ci

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint || true

      - name: Tests frontend avec coverage
        working-directory: ./frontend
        run: npm run test:coverage

      # ── SonarCloud (Laravel + React) ──
      - name: SonarCloud Scan — Laravel + React
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ── Docker build ──
      - name: Build images Docker
        run: |
          docker build -t skillhub-api:${{ github.sha }} ./backend
          docker build \
            --build-arg VITE_API_BASE_URL=http://localhost:8000 \
            -t skillhub-frontend:${{ github.sha }} ./frontend
          docker build -t skillhub-auth:${{ github.sha }} ./auth-service


  # ─────────────────────────────────────────
  # JOB 3 — CD : push images vers Docker Hub
  # Uniquement sur merge → main
  # ─────────────────────────────────────────
  cd:
    name: CD — Push to Docker Hub
    runs-on: ubuntu-latest
    needs: [auth-service, ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillhub-auth:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/skillhub-auth:latest

      - name: Build and push API Laravel
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillhub-api:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/skillhub-api:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_BASE_URL=http://localhost:8000
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillhub-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/skillhub-frontend:latest
# =====================
# H2 en mémoire pour les tests
# =====================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# =====================
# JWT (clé fixe pour les tests)
# =====================
app.jwt.secret=c2VjcmV0LWtleS10cDMtYXV0aHNlcnZlci1zdXBlci1sb25nLXN0cmluZy0yNTZiaXRz
app.jwt.expiration-ms=900000

# =====================
# Master Key (valeur fixe pour les tests — jamais en prod !)
# =====================
APP_MASTER_KEY=test_master_key_for_ci_only_32chars

# =====================
# Auth Protocol
# =====================
app.auth.timestamp-window-seconds=60
app.auth.nonce-ttl-seconds=120
# =====================
# H2 Database (in-memory)
# =====================
spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =====================
# JWT Configuration
# =====================
# Secret key (min 256 bits pour HS256)
app.jwt.secret=c2VjcmV0LWtleS10cDMtYXV0aHNlcnZlci1zdXBlci1sb25nLXN0cmluZy0yNTZiaXRz
# 15 minutes en millisecondes
app.jwt.expiration-ms=900000

# =====================
# Master Key
# =====================
# APP_MASTER_KEY doit etre injectee via variable d'environnement
# Ne jamais mettre la vraie cle ici !
# Lancer avec : set APP_MASTER_KEY=votre_cle_32_caracteres_minimum

# =====================
# Auth Protocol Settings
# =====================
# Fenetre de validite du timestamp (en secondes)
app.auth.timestamp-window-seconds=60
# TTL du nonce en base (en secondes)
app.auth.nonce-ttl-seconds=120
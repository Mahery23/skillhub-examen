# =====================
# MySQL (prod via Docker)
# DB_URL, DB_USERNAME, DB_PASSWORD sont injectés par docker-compose
# =====================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/authdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# =====================
# JWT — même secret que Laravel (JWT_SECRET dans .env)
# Injecté via la variable JWT_SECRET dans docker-compose
# =====================
app.jwt.secret=${JWT_SECRET:changeme_default_secret_32chars_min}
app.jwt.expiration-ms=900000

# =====================
# Master Key AES-GCM — injectée via APP_MASTER_KEY dans docker-compose
# Ne jamais mettre la vraie clé ici !
# =====================
# (lue directement par CryptoService via @Value("${APP_MASTER_KEY}"))

# =====================
# Protocole HMAC
# =====================
app.auth.timestamp-window-seconds=60
app.auth.nonce-ttl-seconds=120

# =====================
# Serveur
# =====================
server.port=8080

# =====================
# Actuator — pour le healthcheck Docker
# =====================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never